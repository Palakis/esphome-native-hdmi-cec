esphome:
  name: "hdmi-cec-demo"

external_components:
  - source:
      type: local
      path: components

esp32:
  board: esp32dev

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret encryption_key
  services:
    - service: hdmi_cec_send
      variables:
        cec_source: int
        cec_destination: int
        cec_data: int[]
      then:
        - hdmi_cec.send:
            source: !lambda "return static_cast<unsigned char>(cec_source);"
            destination: !lambda "return static_cast<unsigned char>(cec_destination);"
            data: !lambda "std::vector<unsigned char> charVector; for (int i : cec_data) { charVector.push_back(static_cast<unsigned char>(i)); } return charVector;"

# Enable OTA
ota:
  - platform: esphome
    password: !secret mgmt_pass

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: True

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:

captive_portal:

hdmi_cec:
  id: cec
  pin: GPIO26
  physical_address: 0x4000
  scan_on_boot: true
  scan_boot_delay: 3s
  on_scan_complete:
    - then:
        - lambda: |-
            for (uint8_t i = 0; i < 15; i++) {
              if (id(cec).seen_on_last_scan(i)) {
                auto &dev = id(cec).get_device_info(i);
                ESP_LOGI("cec_scan", "Device 0x%X: type=%d phys=%04X name='%s' vendor=%06X",
                         i, dev.device_type, dev.physical_address,
                         dev.osd_name.c_str(), dev.vendor_id);
              }
            }
  on_message:
    # Volume Up
    - data: [0x44, 0x41]
      then:
        logger.log: "Volume Up"

    # Volume Down
    - data: [0x44, 0x42]
      then:
        logger.log: "Volume Down"

    # Mute
    - data: [0x44, 0x43]
      then:
        - logger.log: "Mute"
