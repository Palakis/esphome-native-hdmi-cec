esphome:
  name: "hdmi-cec-demo"

external_components:
  - source:
      type: local
      path: components

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret encryption_key
  # Enable CEC services (send, scan_bus, etc.) in Home Assistant
  custom_services: true

# Enable OTA
ota:
  - platform: esphome
    password: !secret mgmt_pass

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: True

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:

captive_portal:

hdmi_cec:
  id: cec
  pin: GPIO26
  physical_address: 0x4000
  scan_on_boot: true
  scan_boot_delay: 3s
  on_scan_complete:
    - then:
        - logger.log: "CEC bus scan complete"
  on_message:
    # Volume Up
    - data: [0x44, 0x41]
      then:
        logger.log: "Volume Up"

    # Volume Down
    - data: [0x44, 0x42]
      then:
        logger.log: "Volume Down"

    # Mute
    - data: [0x44, 0x43]
      then:
        - logger.log: "Mute"
